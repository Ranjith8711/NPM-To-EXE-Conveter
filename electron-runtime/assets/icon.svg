<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="52" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="256" height="128" rx="52" fill="url(#shine)"/>
  <!-- Hexagon shape -->
  <polygon points="128,40 196,80 196,160 128,200 60,160 60,80"
           fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Letter -->
  <text x="128" y="155" font-family="Arial Black, Arial, sans-serif"
        font-size="100" font-weight="900" text-anchor="middle"
        fill="white" opacity="0.95">Q</text>
  <!-- Subtitle -->
  <text x="128" y="230" font-family="Arial, sans-serif"
        font-size="18" font-weight="bold" text-anchor="middle"
        fill="rgba(255,255,255,0.7)" letter-spacing="4">CONVERT</text>
</svg>
